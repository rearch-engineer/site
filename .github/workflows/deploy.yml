# ============================================================================
# ReArch Website - GitHub Actions CI/CD Pipeline
# ============================================================================
# Triggers on pushes to main branch.
# Runs lint and tests on a GitHub-hosted runner, then builds the Docker image
# and deploys to the Docker Swarm on the self-hosted runner.
#
# Pipeline:
#   lint-test (GitHub-hosted) -> build-deploy (self-hosted lab34-prod)
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#   - REGISTRY_USERNAME: Gitea username or deploy token
#   - REGISTRY_PASSWORD: Gitea password or deploy token secret
# ============================================================================

name: Deploy Website

on:
  push:
    branches:
      - main

env:
  REGISTRY: git.lab34.es
  IMAGE_PREFIX: git.lab34.es/rearch
  STACK_NAME: rearch

jobs:
  # -- Lint & Test (GitHub-hosted runner) ------------------------------------
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        continue-on-error: true
        run: bun run check

      - name: Run unit tests
        continue-on-error: true # no tests currently
        run: bun run test

  # -- Build & Deploy (self-hosted runner on Swarm manager) ------------------
  build-deploy:
    runs-on: [self-hosted, lab34-prod]
    needs: lint-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to Gitea Container Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            --build-arg SITE_URL=https://rearch.engineer \
            -t ${{ env.IMAGE_PREFIX }}/website:latest \
            -t ${{ env.IMAGE_PREFIX }}/website:${{ steps.vars.outputs.sha_short }} \
            .

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/website:latest
          docker push ${{ env.IMAGE_PREFIX }}/website:${{ steps.vars.outputs.sha_short }}

      - name: Update Swarm service
        run: |
          docker service update \
            --image ${{ env.IMAGE_PREFIX }}/website:${{ steps.vars.outputs.sha_short }} \
            --with-registry-auth \
            --no-resolve-image \
            --update-order start-first \
            --update-failure-action rollback \
            --update-delay 10s \
            --update-monitor 10s \
            ${{ env.STACK_NAME }}_website

      - name: Verify deployment
        run: |
          echo "=== Website service status ==="
          docker service ps ${{ env.STACK_NAME }}_website --no-trunc \
            --filter "desired-state=running" \
            --format "table {{.Name}}\t{{.Image}}\t{{.CurrentState}}\t{{.Error}}" || true
